    <h1 class="text-center">Profile</h1>

    
    <div class="container-fluid d-flex justify-content-center align-items-center" style="min-height: 90vh;">

        <div class="col-md-6 col-lg-5">

            <div class="card shadow-lg">
                <div class="card-body">

                    <h3 class="text-center mb-4">
                        <i class="bi bi-person-circle"></i>
                        Profil Administrateur
                    </h3>

                    <hr>

                    <!-- Nom -->
                    <div class="d-flex align-items-center mb-3">
                        <i class="bi bi-person-fill text-primary mr-3" style="font-size: 1.5rem;"></i>
                        <div>
                            <strong>Nom :</strong>
                            <div id="nom">---</div>
                        </div>
                    </div>

                    <!-- Téléphone -->
                    <div class="d-flex align-items-center mb-3">
                        <i class="bi bi-telephone-fill text-success mr-3" style="font-size: 1.5rem;"></i>
                        <div>
                            <strong>Telephone :</strong>
                            <div id="telephone">---</div>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="d-flex align-items-center mb-3">
                        <i class="bi bi-envelope-fill text-warning mr-3" style="font-size: 1.5rem;"></i>
                        <div>
                            <strong>Email :</strong>
                            <div id="email">---</div>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="d-flex align-items-center">
                        <i class="bi bi-lock-fill text-danger mr-3" style="font-size: 1.5rem;"></i>
                        <div>
                            <strong>Mot de passe :</strong>
                            <div id="password">---</div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
